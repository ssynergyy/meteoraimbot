name: Build Mod

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build
        run: |
          gradle-8.13/bin/gradle wrapper
          ./gradlew build
      - uses: actions/upload-artifact@v3
        with:
          name: mod-jar
          path: build/libs/*.jar
